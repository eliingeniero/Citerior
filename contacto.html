    <!-- SCRIPT PARA ENVÍO DE FORMULARIO -->
    <script>
      document.getElementById("formContacto").addEventListener("submit", function (e) {
        e.preventDefault(); // Evita que la página se recargue

        var form = this;
        var mensajeDiv = form.querySelector(".form-mensaje");
        var btn = form.querySelector(".btn-enviar");
        var originalBtnText = btn.textContent;

        // Feedback visual inmediato
        btn.disabled = true;
        btn.textContent = "Enviando...";
        mensajeDiv.style.display = "block";
        mensajeDiv.textContent = "";

        var formData = new FormData(form);

        // Cambia esta URL por la dirección real donde alojes tu script PHP
        fetch("https://www.citerior.com/enviar_contacto.php", {
          method: "POST",
          body: formData,
        })
          .then((response) => response.text())
          .then((data) => {
            // El PHP devuelve "tipo|mensaje"
            var partes = data.split("|");
            var tipo = partes[0]; // 'ok' o 'error'
            var texto = partes[1] || data;

            mensajeDiv.textContent = texto;
            mensajeDiv.style.color = tipo === "ok" ? "#28a745" : "#dc3545"; // Verde o Rojo
            mensajeDiv.style.marginTop = "10px";
            mensajeDiv.style.fontWeight = "bold";

            if (tipo === "ok") {
              form.reset();
            }
          })
          .catch((error) => {
            mensajeDiv.textContent = "Error de conexión. Por favor, inténtalo más tarde.";
            mensajeDiv.style.color = "#dc3545";
          })
          .finally(() => {
            btn.disabled = false;
            btn.textContent = originalBtnText;
          });
      });
    </script>
